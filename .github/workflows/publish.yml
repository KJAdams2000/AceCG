name: Build & Publish (TestPyPI -> PyPI)

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build sdist & wheel
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Get version from tag
        id: get_version
        run: |
          TAG="${GITHUB_REF##*/}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ steps.get_version.outputs.version }}
          path: dist/*

  publish-testpypi:
    name: Publish to TestPyPI (OIDC)
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi-release
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.version }}
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI (requires approval, OIDC)
    needs:
      - build
      - publish-testpypi
    runs-on: ubuntu-latest
    environment: pypi-release
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.version }}
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
